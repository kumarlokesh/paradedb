# workflows/benchmark-pg_search-benchmarks.yml
#
# Benchmark pg_search - Queries
# Run our queries benchmark suite against pg_search.

name: Benchmark pg_search - Queries

# We run benchmarks on `main`, and on `benchmark`-labeled PRs.
on:
  push:
    branches:
      - main
    paths:
      - "benchmarks/**"
      - "**/*.rs"
      - "**/*.toml"
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      commit:
        description: "A specific commit hash or tag to benchmark. Uses `main` if not specified."
        required: false
        default: ""
      fail_on_error:
        description: "Whether to fail on query errors. Set to false for backfills against older versions."
        required: false
        type: boolean
        default: true

permissions:
  actions: write
  contents: write
  deployments: write
  pull-requests: write

# We don't specify a concurrency group here, as we want all jobs to complete.

jobs:
  benchmark-pg_search-benchmarks:
    name: Run Benchmark Jobs
    runs-on:
      # To configure the runners: https://runs-on.com/configuration/job-labels/#how-it-works (runs in us-east-1)
      - runs-on=${{ github.run_id }}
      - family=z1d.metal
      - image=ubuntu24-full-x64
      - extras=s3-cache # See https://runs-on.com/caching/magic-cache/
      #- volume=500gb:gp3
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        contains(fromJson('["benchmark", "benchmark-queries", "benchmark-queries-stackoverflow", "benchmark-queries-docs"]'), github.event.label.name)
      )
    env:
      pg_version: 18

    steps:
      # The job can be triggered manually by attaching the `benchmark` label to a PR. This step
      # removes the label once the job has started, so it can be applied again if needed.
      - name: Maybe Remove Label
        uses: actions-ecosystem/action-remove-labels@v1
        if: >-
          github.event_name == 'pull_request' &&
          contains(fromJson('["benchmark", "benchmark-queries", "benchmark-queries-stackoverflow", "benchmark-queries-docs"]'), github.event.label.name)
        with:
          labels: |
            benchmark
            benchmark-queries
            benchmark-queries-stackoverflow
            benchmark-queries-docs

      - name: Determine Ref to Benchmark
        id: determine-ref
        run: |
          # If a specific commit was provided via workflow_dispatch, use that.
          # For pull_request events, benchmark the PR merge commit (github.sha),
          # which exists in the base repo even for forks.
          # Otherwise, default to main.
          if [ -n "${{ inputs.commit }}" ]; then
            echo "ref=${{ inputs.commit }}" >> "$GITHUB_OUTPUT"
            echo "Determined ref from workflow_dispatch input: ${{ inputs.commit }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "Determined ref from pull_request event: ${{ github.sha }}"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "Determined ref as default: main"
          fi

      - name: Checkout Git Repository at ref=${{ steps.determine-ref.outputs.ref }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.determine-ref.outputs.ref }}
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_CI_SUBACCOUNT_GITHUB_ACTIONS_USER_AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_CI_SUBACCOUNT_GITHUB_ACTIONS_USER_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Derive Short Commit
        id: commit_info
        run: |
          short_commit=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "short_commit=$short_commit" >> $GITHUB_OUTPUT
          echo "Deriving short commit: $short_commit"

      - name: Fetch the Latest Composite Actions
        if: >-
          github.event_name != 'workflow_dispatch' &&
          !contains(fromJson('["benchmark", "benchmark-queries", "benchmark-queries-stackoverflow", "benchmark-queries-docs"]'), github.event.label.name)
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          path: actions-temp
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      - name: Copy latest actions into place
        if: >-
          github.event_name != 'workflow_dispatch' &&
          !contains(fromJson('["benchmark", "benchmark-queries", "benchmark-queries-stackoverflow", "benchmark-queries-docs"]'), github.event.label.name)
        run: cp -rv actions-temp/.github/actions .github/

      - name: Cleanup temporary checkout
        if: >-
          github.event_name != 'workflow_dispatch' &&
          !contains(fromJson('["benchmark", "benchmark-queries", "benchmark-queries-stackoverflow", "benchmark-queries-docs"]'), github.event.label.name)
        run: rm -rf actions-temp

      # only fetch the latest from main when, essentially, we're merging to main.  otherwise, use whatever we checked out in the ref we're benchmarking
      - name: Fetch latest benchmark code, suites
        if: >-
          github.event_name != 'workflow_dispatch' &&
          !contains(fromJson('["benchmark", "benchmark-queries", "benchmark-queries-stackoverflow", "benchmark-queries-docs"]'), github.event.label.name)
        uses: ./.github/actions/benchmarks-from-main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve git ref to PR
        id: pr_label
        uses: actions/github-script@v8
        env:
          # ← Set this to whatever ref you’re resolving:
          # • a SHA:            ${{ github.sha }}
          # • a branch name:    ${{ github.ref_name }}
          # • a tag:            ${{ github.ref_name }}
          # • a PR number:      e.g. “123”
          TARGET_REF: ${{ steps.determine-ref.outputs.ref || steps.commit_info.outputs.short_commit }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const { owner, repo } = context.repo;
            const ref = process.env.TARGET_REF;

            let pr = null;

            // If the ref is purely numeric, treat it as a PR number
            if (/^\d+$/.test(ref)) {
              try {
                const { data } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: parseInt(ref, 10)
                });
                pr = data;
              } catch (e) {
                // not a valid PR number → fall through
              }
            }

            // Otherwise, try to find any PR associated with this commit SHA
            if (!pr) {
              const res = await github.request(
                'GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls',
                {
                  owner,
                  repo,
                  commit_sha: ref,
                  headers: {
                    accept: 'application/vnd.github.groot-preview+json'
                  }
                }
              );
              if (res.data.length) {
                pr = res.data[0];
              }
            }

            // Return “PR #123: Title” or the raw ref
            return pr
              ? `PR #${pr.number}: ${pr.title}`
              : ref;

      - name: Running for ${{ steps.pr_label.outputs.result }}"
        run: echo ${{ steps.pr_label.outputs.result }}

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: "" # Use .cargo/config.toml target-cpu flags

      - name: Install & Configure Supported PostgreSQL Version
        run: |
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update && sudo apt-get install -y postgresql-${{ env.pg_version }} postgresql-server-dev-${{ env.pg_version }}
          echo "/usr/lib/postgresql/${{ env.pg_version }}/bin" >> $GITHUB_PATH

      # Separate prefix-key from debug workflows — benchmarks compile with --release.
      # Do NOT add hashFiles('**/Cargo.lock') or arch to shared-key.
      # See test-pg_search.yml for rationale.
      - name: Install Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1-benchmarks-rust-cache"
          shared-key: pg${{ env.pg_version }}
          cache-targets: true
          cache-all-crates: true
          cache-on-failure: true

      - name: Extract pgrx Version
        id: pgrx
        run: echo "version=$(sed -nE 's/^pgrx = "=?([^"]+)"$/\1/p' Cargo.toml)" >> $GITHUB_OUTPUT

      - name: Install pgrx
        run: cargo install cargo-pgrx --version ${{ steps.pgrx.outputs.version }} --debug --locked

      - name: Initialize pgrx environment
        run: cargo pgrx init --pg${{ env.pg_version }}=`which pg_config`

      - name: Compile & install pg_search extension
        run: cargo pgrx install -p pg_search --sudo --release --pg-config `which pg_config` --features=pg${{ env.pg_version }} --no-default-features

      - name: Start Postgres
        working-directory: pg_search/
        run: |
          cargo pgrx start pg${{ env.pg_version }}

      - name: Configure PostgreSQL settings and machine settings
        working-directory: /home/runner/.pgrx/data-${{ env.pg_version }}/
        run: |
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM RESET ALL;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET shared_preload_libraries = pg_search,pg_stat_statements;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET maintenance_work_mem = '12GB';"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET shared_buffers = '12GB';"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET max_parallel_workers = 8;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET max_worker_processes = 8;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET max_parallel_maintenance_workers = 8;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET max_parallel_workers_per_gather = 8;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET autovacuum = off;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET max_wal_size = '100GB';"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET jit = off;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET bgwriter_lru_maxpages = 0;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET max_wal_senders = 0;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET wal_level = minimal;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET huge_pages = on;"
          sudo sysctl -w vm.nr_hugepages=10000

      - name: Restart Postgres
        working-directory: pg_search/
        run: |
          cargo pgrx stop pg${{ env.pg_version }}
          cargo pgrx start pg${{ env.pg_version }}

      - name: Install pg_stat_statements
        working-directory: /home/runner/.pgrx/data-${{ env.pg_version }}/
        run: |
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "CREATE EXTENSION pg_stat_statements;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET pg_stat_statements.track_planning = on;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET pg_stat_statements.track = top ;"

      - name: Install pg_search
        working-directory: pg_search/
        run: |
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "CREATE EXTENSION IF NOT EXISTS pg_search;"
          psql postgresql://localhost:288${{ env.pg_version }}/postgres -c "ALTER SYSTEM SET paradedb.global_target_segment_count = 48";

      - name: Restart Postgres
        working-directory: pg_search/
        run: |
          cargo pgrx stop pg${{ env.pg_version }}
          cargo pgrx start pg${{ env.pg_version }}

      - name: Capture host hardware fingerprint
        shell: bash
        run: |
          echo "=== HOST FINGERPRINT BEGIN ==="
          # AWS instance metadata (IMDSv2)
          TOKEN=$(curl -sS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60" 2>/dev/null || true)
          if [ -n "$TOKEN" ]; then
            for key in instance-id instance-type placement/availability-zone placement/region ami-id; do
              val=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" "http://169.254.169.254/latest/meta-data/$key" 2>/dev/null || echo "n/a")
              echo "fingerprint.aws.${key}: $val"
            done
          fi
          # CPU model + microcode + frequency
          echo "fingerprint.cpu.model: $(grep -m1 'model name' /proc/cpuinfo | sed 's/.*: //')"
          echo "fingerprint.cpu.microcode: $(grep -m1 microcode /proc/cpuinfo | sed 's/.*: //')"
          echo "fingerprint.cpu.cpu_mhz: $(grep -m1 'cpu MHz' /proc/cpuinfo | sed 's/.*: //')"
          echo "fingerprint.cpu.cores: $(nproc)"
          echo "fingerprint.cpu.stepping: $(grep -m1 stepping /proc/cpuinfo | sed 's/.*: //')"
          echo "fingerprint.cpu.flags_hash: $(grep -m1 flags /proc/cpuinfo | sed 's/.*: //' | sha256sum | cut -c1-16)"
          # CPU vulnerability mitigations (Spectre/Meltdown/MDS/etc.)
          for f in /sys/devices/system/cpu/vulnerabilities/*; do
            [ -f "$f" ] && echo "fingerprint.vuln.$(basename $f): $(cat $f)"
          done
          # Frequency / power state
          echo "fingerprint.cpu.scaling_driver: $(cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_driver 2>/dev/null || echo n/a)"
          echo "fingerprint.cpu.scaling_governor: $(cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor 2>/dev/null || echo n/a)"
          echo "fingerprint.cpu.intel_no_turbo: $(cat /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || echo n/a)"
          # Kernel
          echo "fingerprint.kernel: $(uname -r)"
          echo "fingerprint.uptime_seconds: $(awk '{print int($1)}' /proc/uptime)"
          # Memory
          echo "fingerprint.memory.total_kb: $(grep -m1 MemTotal /proc/meminfo | awk '{print $2}')"
          # NVMe / disk
          if command -v nvme >/dev/null 2>&1; then
            echo "fingerprint.nvme.devices:"
            nvme list 2>/dev/null | sed 's/^/  /' || true
          fi
          lscpu 2>/dev/null | sed 's/^/lscpu: /' || true
          echo "=== HOST FINGERPRINT END ==="

      - name: Benchmark "stackoverflow" Dataset (1M)
        if: >-
          github.event_name != 'pull_request' ||
          contains(fromJson('["benchmark", "benchmark-queries", "benchmark-queries-stackoverflow"]'), github.event.label.name)
        uses: ./.github/actions/benchmark-queries
        with:
          mode: existing
          dataset: stackoverflow
          size: 1m
          ref: ${{ steps.determine-ref.outputs.ref || steps.commit_info.outputs.short_commit }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          slack_oauth_token: ${{ secrets.SLACK_OAUTH_TOKEN }}
          slack_channel: ${{ secrets.SLACK_BENCHMARKS_CHANNEL_ID }}
          pr_label: ${{ steps.pr_label.outputs.result }}
          fail_on_error: ${{ inputs.fail_on_error || true }}
